---

name: CI Pipeline

# when to run
on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs: 
  test-and-build:
    runs-on: ubuntu-latest # chosen VM 
    defaults:
      run:
        working-directory: containerized-webapp-cicd 

    steps:
      # grab code
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/containerized-webapp:latest .

      - name: Push to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/containerized-webapp:latest

      - name: Install ansible and podman collection 
        run: |
          pip install ansible
          ansible-galaxy collection install containers.podman

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy to VMs via Ansible
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
        run: |
          cd ../ansible-server-bootstrap
          echo "${{ secrets.VM_SSH_KEY }}" > /tmp/deploy_key
          echo "${{ secrets.ANSIBLE_VAULT_PASS }}" > /tmp/vault_pass
          chmod 600 /tmp/deploy_key
          chmod 600 /tmp/vault_pass
          ansible-playbook -i inventories/tailscale_inventory.py deploy_container.yml \
            --private-key /tmp/deploy_key \
            --user devops \
            --vault-password-file /tmp/vault_pass \
            -e "ansible_ssh_common_args='-o StrictHostKeyChecking=no'"
