---

name: CI Pipeline

# when to run
on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs: 
  test-and-build:
    runs-on: ubuntu-latest # chosen VM 
    defaults:
      run:
        working-directory: containerized-webapp-ci 

    steps:
      # grab code
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run tests
        run: pytest tests/

      - name: Build docker image
        run: docker build -t containerized-webapp:latest .

