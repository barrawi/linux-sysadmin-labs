---

- name: Deploy containerized webapp 
  hosts: webservers 
  become: yes

  tasks:
    - name: Pull latest image from Docker Hub
      containers.podman.podman_image:
        name: "docker.io/{{ dockerhub_username }}/containerized-webapp"
        tag: latest 
        force: yes # pull even if already exists 

    - name: Run stack with podman-compose 
      ansible.builtin.command:
        cmd: podman-compose up -d --force-recreate
        chdir: "{{ app_deploy_dir }}"
      become: yes
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ hostvars[inventory_hostname]['ansible_user_uid'] | default('1000') }}"
      become_user: "{{ admin_username }}"
      register: compose_output
      ignore_errors: no

