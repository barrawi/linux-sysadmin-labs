---

- name: Deploy containerized webapp 
  hosts: webservers 
  become: yes

  tasks:
    - name: Pull latest image from Docker Hub
      containers.podman.podman_image:
        name: "docker.io/{{ dockerhub_username }}/containerized-webapp"
        tag: latest 
        force: yes # pull even if already exists 

    - name: Get devops UID
      ansible.builtin.command:
        cmd: id -u {{ admin_username }}
      register: devops_uid
      changed_when: false

    - name: Run stack with podman-compose 
      ansible.builtin.command:
        cmd: /usr/local/bin/podman-compose up -d --force-recreate
        chdir: "{{ app_deploy_dir }}"
      become_user: "{{ admin_username }}"
      environment:
        # added explicit PATH 
        # also aimed for devops UID
        PATH: "/usr/local/bin:/usr/bin:/bin" 
        XDG_RUNTIME_DIR: "/run/user/{{ devops_uid.stdout }}"
