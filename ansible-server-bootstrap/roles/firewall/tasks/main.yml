--- 

# Even though installation is verified in the common role autonomy it will be kept here as well
- name: Ensure firewalld is installed and running
  ansible.builtin.dnf:
    name: firewalld
    state: present

- name: Start and enable firewalld
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: yes

# Refined firewall logic
- name: Permit SSH on the public network 
  ansible.posix.firewalld:
    service: ssh 
    zone: public
    permanent: yes
    state: enabled
    immediate: yes

  # disabled on the public zone
- name: Block HTTP on the public network # my ethernet and wifi
  ansible.posix.firewalld:
    service: http 
    zone: public  
    permanent: yes
    state: disabled
    immediate: yes

- name: Bind Tailscale to trusted
  ansible.posix.firewalld:
    interface: tailscale0 
    zone: trusted
    permanent: yes
    state: enabled
    immediate: yes
  
  # enabled on the trusted zone  
- name: Permit HTTP traffic but ONLY via tailscale 
  ansible.posix.firewalld:
    service: http
    zone: trusted
    permanent: yes
    state: enabled
    immediate: yes
