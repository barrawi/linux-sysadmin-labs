---
services: 
  # --- web app ---
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: webapp:prod
    container_name: webapp-app
    restart: unless-stopped
    ports: 
      - "${APP_PORT}:5000" # Added the '$' sign here
    env_file:
      - .env
    depends_on:
      - cache
    networks:
      - backend

  # --- redis cache service ---
  cache: 
    image: redis:7-alpine
    container_name: webapp-redis
    restart: unless-stopped
    volumes: 
      - redis_data:/data
    networks: 
      - backend

# define the named volume so data survives container restarts
volumes: 
  redis_data:

# create a private network so the app and redis can talk securely
networks: 
  backend:
    driver: bridge # Fixed 'drivers' to 'driver'
